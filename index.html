<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baby Vegito Black: Ki Blade Slash</title>
    <style>
        body {
            background: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #sliceBtn {
            padding: 30px 60px;
            font-size: 1.8rem;
            cursor: pointer;
            background: linear-gradient(45deg, #4b0082, #8a2be2);
            color: #ffccff;
            border: 3px solid #ff00ff;
            border-radius: 50px;
            box-shadow: 0 0 20px #ff00ff;
            transition: 0.2s;
        }

            #sliceBtn:hover {
                transform: scale(1.1);
                box-shadow: 0 0 40px #ff00ff;
            }
    </style>
</head>
<body>

    <button id="sliceBtn">Ki Blade Slash</button>

   <script src="Script17.js"></script>
</body>
</html>
